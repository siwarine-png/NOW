<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<title>HatchEm</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface-2: #172236;
    --border: #273449;
    --border-soft: #334155;
    --text: #f1f5f9;
    --text-2: #94a3b8;
    --text-3: #64748b;
    --accent: #6366f1;
    --accent-2: #818cf8;
    --warm: #f59e0b;
    --good: #34d399;
    --font-round: ui-rounded, "SF Pro Rounded", "Segoe UI Rounded", system-ui, -apple-system, sans-serif;
    --font-body: system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  .app {
    position: relative;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Header ---------- */
  .header {
    flex: 0 0 auto;
    padding: 22px 20px 4px;
    text-align: center;
  }
  .wordmark {
    font-family: var(--font-round);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.2px;
    color: var(--text);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .wordmark .egg { font-size: 20px; line-height: 1; }
  .tagline {
    margin-top: 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-3);
  }

  /* ---------- Stage (canvas incubator) ---------- */
  .stage {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
  }
  #field { display: block; width: 100%; height: 100%; touch-action: manipulation; }
  .empty-hint {
    position: absolute;
    left: 50%; top: 46%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: var(--text-3);
    font-size: 14px;
    line-height: 1.5;
    max-width: 240px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .empty-hint.visible { opacity: 1; }

  /* ---------- Footer / capture zone ---------- */
  .footer {
    flex: 0 0 auto;
    padding: 0 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .capture-row {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 420px;
    min-height: 50px;
  }

  .fab {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 22px;
    font-weight: 400;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 6px 18px -6px rgba(99, 102, 241, 0.55);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .fab:hover { transform: translateY(-1px); box-shadow: 0 8px 22px -6px rgba(99, 102, 241, 0.65); }
  .fab:active { transform: scale(0.94); }
  .fab:focus-visible, .icon-btn:focus-visible, .action-btn:focus-visible, .text-link:focus-visible {
    outline: 2px solid var(--accent-2);
    outline-offset: 2px;
  }

  /* Collapses to zero width when closed instead of just fading out --
     it used to stay at full width in the flex row even while invisible
     (opacity alone), which pushed the "+" off-center rather than ever
     letting it sit as a true centerpiece. Zero width means the fab is the
     row's only real content until this actually opens. */
  .capture-panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 0;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 22px;
    padding: 10px 0;
    opacity: 0;
    transform: scale(0.92);
    pointer-events: none;
    transition: width 0.2s ease, opacity 0.16s ease, transform 0.2s ease, padding 0.2s ease;
  }
  .capture-panel.open {
    width: 100%;
    padding: 10px 8px 8px 14px;
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  /* Category chips -- picking one is optional friction: the last-used
     category is pre-selected, so a fast capture never HAS to touch this
     row. It's there for the moments the kind of thought matters. */
  .category-chips {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 1px 4px 1px 1px;
    scrollbar-width: none;
  }
  .category-chips::-webkit-scrollbar { display: none; }
  .cat-chip {
    flex: 0 0 auto;
    border: 1.5px solid var(--border-soft);
    background: transparent;
    color: var(--text-2);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    font-family: var(--font-body);
    white-space: nowrap;
  }
  .cat-chip.add {
    color: var(--text-3);
    border-style: dashed;
  }
  .cat-chip:hover { border-color: var(--text-3); }

  .capture-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .capture-input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    font-family: var(--font-body);
    min-width: 0;
    padding: 6px 0 6px 4px;
  }
  .capture-input-row input::placeholder { color: var(--text-3); }

  /* Live repeat suggestions -- slides open once enough is typed to be a
     real signal (not on the first keystroke), offers the closest existing
     incubating thoughts to bump instead of typing the whole thing again.
     Purely optional: ignoring it and hitting submit still works exactly
     the same way (doCapture's own exact-match check on submit). */
  .suggestions {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: max-height 0.22s ease, opacity 0.18s ease, margin-top 0.22s ease;
  }
  .suggestions.open { max-height: 220px; opacity: 1; margin-top: 2px; }
  .suggestion-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    text-align: left;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 10px;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .suggestion-row:hover { border-color: var(--border-soft); }
  .suggestion-dot { flex: 0 0 auto; width: 8px; height: 8px; border-radius: 50%; }
  .suggestion-text {
    flex: 1;
    min-width: 0;
    font-size: 13px;
    color: var(--text-2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .suggestion-count {
    flex: 0 0 auto;
    font-size: 10.5px;
    font-weight: 800;
    color: var(--text-3);
  }
  .icon-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex: 0 0 auto;
    font-size: 18px;
  }
  .icon-btn.submit { background: var(--accent); color: #fff; }
  .icon-btn.submit:disabled { background: var(--border-soft); color: var(--text-3); cursor: default; }
  .icon-btn.cancel { background: transparent; color: var(--text-3); }
  .icon-btn.cancel:hover { color: var(--text-2); }
  .icon-btn.mic { background: transparent; color: var(--text-2); font-size: 17px; }
  .icon-btn.mic:hover { color: var(--text); }
  .icon-btn.mic.listening {
    background: rgba(248, 113, 113, 0.15);
    color: #f87171;
    animation: mic-pulse 1.3s ease-in-out infinite;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.35); }
    50% { box-shadow: 0 0 0 7px rgba(248, 113, 113, 0); }
  }
  .mic-status {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: #f87171;
    margin-top: 2px;
  }

  .confirm-flash {
    position: absolute;
    bottom: 92px; left: 50%;
    transform: translateX(-50%) translateY(6px);
    color: var(--good);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.2px;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .confirm-flash.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .footer-links {
    display: flex;
    gap: 22px;
    align-items: center;
  }
  .text-link {
    background: none; border: none;
    color: var(--text-2);
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    padding: 4px 2px;
    font-family: var(--font-body);
  }
  .text-link:hover { color: var(--text); }
  .text-link.quiet { color: var(--text-3); font-weight: 600; }
  .text-link.quiet:hover { color: var(--text-2); }

  /* ---------- Popover (view one idea) ---------- */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(4, 8, 20, 0.6);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 30;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    width: 100%; max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    padding: 22px 22px 28px;
    transform: translateY(16px);
    transition: transform 0.22s ease;
  }
  .sheet-backdrop.open .sheet { transform: translateY(0); }
  .sheet-badge-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .sheet-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.4px;
    color: var(--warm);
    background: rgba(245, 158, 11, 0.12);
    padding: 3px 9px;
    border-radius: 999px;
  }
  /* Category badge's color/background are set inline per-category (see
     categoryColor() in JS) -- deterministic per name, not user-picked. */
  .cat-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2px;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .sheet-text {
    font-size: 18px;
    line-height: 1.5;
    color: var(--text);
    font-weight: 600;
    margin: 0 0 10px;
  }
  .sheet-meta {
    font-size: 12.5px;
    color: var(--text-3);
    font-variant-numeric: tabular-nums;
  }
  .sheet-close {
    margin-top: 18px;
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: 1px solid var(--border-soft);
    background: transparent;
    color: var(--text-2);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .sheet-close:hover { background: var(--surface-2); }

  /* ---------- Check-in takeover ---------- */
  .checkin {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 20;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  .checkin.open { opacity: 1; transform: translateY(0); pointer-events: auto; }

  .checkin-top {
    flex: 0 0 auto;
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .checkin-title {
    font-family: var(--font-round);
    font-weight: 800;
    font-size: 15px;
    color: var(--text-2);
  }
  .checkin-progress {
    display: flex;
    gap: 5px;
  }
  .checkin-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border-soft); }
  .checkin-dot.done { background: var(--accent-2); }

  .checkin-body {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-height: 0;
  }
  .checkin-card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 22px;
    padding: 30px 26px;
    text-align: center;
  }
  .checkin-eyebrow {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 8px;
  }
  .checkin-badges { display: flex; justify-content: center; margin-bottom: 14px; }
  .checkin-idea {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
    margin: 0 0 10px;
    text-wrap: balance;
  }
  .checkin-age {
    font-size: 13px;
    color: var(--text-3);
    margin-bottom: 4px;
  }

  .checkin-done {
    max-width: 340px;
  }
  .checkin-done .glyph { font-size: 40px; margin-bottom: 10px; }
  .checkin-done h2 {
    font-family: var(--font-round);
    font-size: 19px;
    color: var(--text);
    margin: 0 0 8px;
  }
  .checkin-done p { color: var(--text-2); font-size: 14px; line-height: 1.6; margin: 0; }

  .checkin-actions {
    flex: 0 0 auto;
    padding: 0 20px 26px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 420px;
    width: 100%;
    margin: 0 auto;
  }
  .action-btn {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: 1px solid var(--border-soft);
    background: var(--surface);
    color: var(--text);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font-body);
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }
  .action-btn:active { transform: scale(0.985); }
  .action-btn.hatch { background: rgba(245, 158, 11, 0.12); border-color: rgba(245, 158, 11, 0.4); color: var(--warm); }
  .action-btn.hatch:hover { background: rgba(245, 158, 11, 0.18); }
  .action-btn.rest { color: var(--text-2); }
  .action-btn.rest:hover { background: var(--surface-2); }
  .action-btn.keep:hover { background: var(--surface-2); }
  .action-btn.close-checkin {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .action-btn.close-checkin:hover { background: #5457e5; }

  /* ---------- Resting overlay ---------- */
  .resting {
    position: fixed; inset: 0;
    background: rgba(4, 8, 20, 0.6);
    z-index: 25;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .resting.open { opacity: 1; pointer-events: auto; }
  .resting-sheet {
    width: 100%; max-width: 480px;
    max-height: 72vh;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 22px;
    display: flex;
    flex-direction: column;
    transform: translateY(16px);
    transition: transform 0.22s ease;
  }
  .resting.open .resting-sheet { transform: translateY(0); }
  .resting-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .resting-header h2 {
    font-family: var(--font-round);
    font-size: 16px;
    color: var(--text);
    margin: 0;
  }
  .resting-list { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .resting-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .resting-row-text { flex: 1; font-size: 13.5px; color: var(--text-2); line-height: 1.4; }
  .resting-row button {
    flex: 0 0 auto;
    background: none; border: 1px solid var(--border-soft);
    color: var(--accent-2);
    font-size: 12px; font-weight: 700;
    padding: 7px 11px;
    border-radius: 9px;
    cursor: pointer;
    font-family: var(--font-body);
    white-space: nowrap;
  }
  .resting-row button:hover { background: var(--surface); }
  .resting-empty { color: var(--text-3); font-size: 13px; text-align: center; padding: 20px 0; }

  /* ---------- AI Analyze overlay -- opt-in, see aiOptIn in JS ---------- */
  .ai-overlay {
    position: fixed; inset: 0;
    background: rgba(4, 8, 20, 0.6);
    z-index: 26;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .ai-overlay.open { opacity: 1; pointer-events: auto; }
  .ai-sheet {
    width: 100%; max-width: 480px;
    max-height: 78vh;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 22px;
    display: flex;
    flex-direction: column;
    transform: translateY(16px);
    transition: transform 0.22s ease;
  }
  .ai-overlay.open .ai-sheet { transform: translateY(0); }
  .ai-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .ai-header h2 { font-family: var(--font-round); font-size: 16px; color: var(--text); margin: 0; }
  .ai-body { overflow-y: auto; }
  .ai-consent-text { font-size: 13.5px; color: var(--text-2); line-height: 1.6; margin: 6px 0 18px; }
  .ai-loading { text-align: center; color: var(--text-3); font-size: 13px; padding: 30px 0; }
  .ai-note {
    font-size: 13.5px; color: var(--text-2); line-height: 1.6;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px; margin-bottom: 16px;
  }
  .ai-section-label { font-size: 10.5px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; }
  .ai-group { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .ai-group-theme { font-size: 13px; font-weight: 800; color: var(--accent-2); margin-bottom: 6px; }
  .ai-group-reason { font-size: 12px; color: var(--text-3); font-style: italic; margin-bottom: 8px; }
  .ai-group-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text-2); padding: 3px 0; }
  .ai-group-dot { flex: 0 0 auto; width: 6px; height: 6px; border-radius: 50%; }
  .ai-merge-btn {
    margin-top: 8px;
    background: none; border: 1px solid var(--accent); color: var(--accent-2);
    font-size: 12px; font-weight: 700; padding: 7px 12px; border-radius: 9px;
    cursor: pointer; font-family: var(--font-body);
  }
  .ai-merge-btn:hover { background: rgba(99, 102, 241, 0.12); }
  .ai-empty { color: var(--text-3); font-size: 13px; text-align: center; padding: 20px 0; }
  .ai-error { color: #f87171; font-size: 13px; text-align: center; padding: 20px 0; line-height: 1.5; }
  .ai-actions { display: flex; gap: 10px; margin-top: 4px; }
  .ai-btn {
    flex: 1; padding: 13px; border-radius: 12px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: var(--font-body); border: 1px solid var(--border-soft);
    background: transparent; color: var(--text-2);
  }
  .ai-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ai-btn.primary:hover { background: #5457e5; }
  .ai-btn:hover { background: var(--surface-2); }
  .ai-disable-row { margin-top: 14px; text-align: center; }
  .ai-disable-row button {
    background: none; border: none; color: var(--text-3);
    font-size: 11.5px; font-weight: 700; cursor: pointer; font-family: var(--font-body);
  }
  .ai-disable-row button:hover { color: var(--text-2); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="wordmark"><span class="egg">🥚</span>HatchEm</div>
    <div class="tagline">brain dump, part of the DayArc system</div>
  </div>

  <div class="stage">
    <canvas id="field" aria-label="Your incubating ideas"></canvas>
    <div class="empty-hint" id="emptyHint">Nothing incubating yet.<br>Capture your first thought below.</div>
  </div>

  <div class="footer">
    <div class="confirm-flash" id="confirmFlash">Safe. ✓</div>
    <div class="capture-row">
      <button class="fab" id="fabBtn" aria-label="Capture a new thought" title="Capture a new thought">+</button>
      <div class="capture-panel" id="capturePanel">
        <div class="category-chips" id="categoryChips"></div>
        <div class="capture-input-row">
          <input id="captureInput" type="text" placeholder="What's on your mind?" maxlength="280" autocomplete="off" />
          <button class="icon-btn mic" id="micBtn" aria-label="Speak your thought" title="Speak your thought" style="display:none">🎤</button>
          <button class="icon-btn cancel" id="cancelCapture" aria-label="Cancel">✕</button>
          <button class="icon-btn submit" id="submitCapture" aria-label="Save" disabled>↑</button>
        </div>
        <div class="mic-status" id="micStatus" style="display:none">Listening…</div>
        <div class="suggestions" id="suggestions"></div>
      </div>
    </div>
    <div class="footer-links">
      <button class="text-link" id="checkinBtn">Check on my ideas</button>
      <button class="text-link quiet" id="analyzeBtn">✨ Analyze</button>
      <button class="text-link quiet" id="restingBtn" style="display:none">Resting</button>
      <button class="text-link quiet" id="exportBtn">Export</button>
    </div>
  </div>
</div>

<!-- View-one-idea popover -->
<div class="sheet-backdrop" id="viewBackdrop">
  <div class="sheet">
    <div class="sheet-badge-row">
      <span class="cat-badge" id="viewCatBadge"></span>
      <span class="sheet-badge" id="viewBadge" style="display:none">🐣 Hatched</span>
    </div>
    <p class="sheet-text" id="viewText"></p>
    <div class="sheet-meta" id="viewMeta"></div>
    <button class="sheet-close" id="viewClose">Close</button>
  </div>
</div>

<!-- Weekly check-in takeover -->
<div class="checkin" id="checkin">
  <div class="checkin-top">
    <div class="checkin-title">Checking on your ideas</div>
    <div class="checkin-progress" id="checkinProgress"></div>
  </div>
  <div class="checkin-body" id="checkinBody"></div>
  <div class="checkin-actions" id="checkinActions"></div>
</div>

<div class="resting" id="restingOverlay">
  <div class="resting-sheet">
    <div class="resting-header">
      <h2>Resting</h2>
      <button class="icon-btn cancel" id="restingClose" aria-label="Close">✕</button>
    </div>
    <div class="resting-list" id="restingList"></div>
  </div>
</div>

<!-- AI Analyze overlay -- opt-in, see aiOptIn in JS -->
<div class="ai-overlay" id="aiOverlay">
  <div class="ai-sheet">
    <div class="ai-header">
      <h2>✨ Analyze</h2>
      <button class="icon-btn cancel" id="aiClose" aria-label="Close">✕</button>
    </div>
    <div class="ai-body" id="aiBody"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ---------------------------------------------------------------------
  // Storage -- idea content NEVER leaves the device. Single key, single
  // array, {id, text, timestamp, status}. status: incubating|hatched|resting.
  // (A future anonymous usage-event pipeline -- capture count, checkin-
  // opened count, hatch count -- would hook in at the marked spots below,
  // logging counts only, never idea text. Not built here: no backend
  // exists for this standalone tool, and none should be added for MVP1.)
  // ---------------------------------------------------------------------
  var STORAGE_KEY = 'hatchem_ideas_v1';

  function loadIdeas() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }
  function saveIdeas(list) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch (e) { /* storage full/unavailable -- best effort */ }
  }
  function uid() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2);
  }

  var ideas = loadIdeas();

  function incubating() { return ideas.filter(function (i) { return i.status === 'incubating'; }); }
  function hatchedList() { return ideas.filter(function (i) { return i.status === 'hatched'; }); }
  function restingList() { return ideas.filter(function (i) { return i.status === 'resting'; }); }

  // ---------------------------------------------------------------------
  // Categories -- what KIND of thing is being dumped (an idea, a stray
  // thought, a worry, whatever you add). Separate small storage key so
  // ideas captured before this existed still load fine (idea.category
  // just reads as undefined and falls back to catName(0) everywhere it's
  // shown -- no migration needed for a client-side-only tool).
  // ---------------------------------------------------------------------
  var CATEGORY_KEY = 'hatchem_categories_v1';
  var LAST_CATEGORY_KEY = 'hatchem_last_category_v1';
  var DEFAULT_CATEGORIES = ['Idea', 'Random Thought', 'Worry'];

  function loadCategories() {
    try {
      var raw = localStorage.getItem(CATEGORY_KEY);
      var list = raw ? JSON.parse(raw) : null;
      return (list && list.length) ? list : DEFAULT_CATEGORIES.slice();
    } catch (e) { return DEFAULT_CATEGORIES.slice(); }
  }
  function saveCategories(list) {
    try { localStorage.setItem(CATEGORY_KEY, JSON.stringify(list)); } catch (e) { /* best effort */ }
  }
  var categories = loadCategories();

  function catName(idea) { return (idea && idea.category) || categories[0] || 'Idea'; }

  // Deterministic per category name -- a newly-added category gets a
  // consistent color the instant it's created, no separate color-picking
  // step (that would be exactly the kind of friction this tool exists to
  // avoid). Amber is reserved for "hatched" and deliberately excluded
  // here so that signal never gets ambiguous with a category's own color.
  var CATEGORY_PALETTE = ['#818cf8', '#f472b6', '#67e8f9', '#c084fc', '#86efac', '#fca5a5'];
  function categoryColor(name) {
    var h = 0;
    for (var i = 0; i < name.length; i++) { h = (h << 5) - h + name.charCodeAt(i); h |= 0; }
    return CATEGORY_PALETTE[Math.abs(h) % CATEGORY_PALETTE.length];
  }
  function hexToRgb(hex) {
    var v = parseInt(hex.slice(1), 16);
    return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
  }

  // ---------------------------------------------------------------------
  // Canvas incubator field -- a shallow arc, dots scattered organically
  // above it. Newer ideas render larger/brighter; nothing ever shrinks
  // away to nothing (still incubating = still fully present). Hatched
  // ideas stay visible as a small amber burst -- a quiet trophy trail,
  // not hidden the moment they're decided.
  // ---------------------------------------------------------------------
  var canvas = document.getElementById('field');
  var ctx = canvas.getContext('2d');
  var emptyHint = document.getElementById('emptyHint');
  var dpr = Math.max(1, window.devicePixelRatio || 1);
  var W = 0, H = 0;
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var t0 = performance.now();
  var dots = []; // rendering model, rebuilt from `ideas` on layout()

  function resize() {
    var rect = canvas.parentElement.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    layout();
  }

  // Arc parameters: a gentle downward-opening curve sitting in the lower
  // third of the stage, like a horizon -- dots rest ABOVE it, gathering
  // more densely near the middle the way things naturally settle.
  function arcY(x) {
    var cx = W / 2;
    var norm = (x - cx) / (W / 2 || 1);
    var baseline = H * 0.72;
    var depth = Math.min(H * 0.16, 90);
    return baseline - depth * (1 - norm * norm);
  }

  // Deterministic pseudo-random per idea id, so a dot doesn't jump around
  // on every re-layout/resize -- same idea, same spot, every time.
  function hash(str) {
    var h = 0;
    for (var i = 0; i < str.length; i++) { h = (h << 5) - h + str.charCodeAt(i); h |= 0; }
    return Math.abs(h);
  }

  function layout() {
    var active = incubating().concat(hatchedList());
    active.sort(function (a, b) { return a.timestamp - b.timestamp; });
    var n = active.length;
    var newestTs = n ? active[n - 1].timestamp : 0;
    var oldestTs = n ? active[0].timestamp : 0;
    var span = Math.max(1, newestTs - oldestTs);

    dots = active.map(function (idea, i) {
      var h = hash(idea.id);
      var spreadX = 0.12 + ((h % 1000) / 1000) * 0.76; // 12%-88% width
      var x = W * spreadX;
      var jitterY = ((h >> 10) % 100) / 100; // 0..1
      var y = arcY(x) - 14 - jitterY * (H * 0.30);
      var recency = span > 0 ? (idea.timestamp - oldestTs) / span : 1;
      // Repeats grow the dot on top of the recency size -- capped at 5
      // extra "counts" worth of growth so a thought captured 30 times
      // doesn't swallow the field, just reads as clearly the biggest one.
      var repeatBoost = Math.min((idea.count || 1) - 1, 5) * 1.8;
      var radius = idea.status === 'hatched' ? (5 + repeatBoost * 0.5) : (5 + recency * 5.5 + repeatBoost);
      var opacity = idea.status === 'hatched' ? 0.9 : (0.5 + recency * 0.5);
      var spawnAt = idea._spawnAt || 0;
      var rgb = hexToRgb(categoryColor(catName(idea)));
      return { idea: idea, x: x, y: y, radius: radius, opacity: opacity, spawnAt: spawnAt, phase: (h % 628) / 100, rgb: rgb };
    });

    emptyHint.classList.toggle('visible', n === 0);
  }

  function draw(now) {
    ctx.clearRect(0, 0, W, H);

    // faint arc line -- the "day arc" the ideas rest above
    ctx.beginPath();
    for (var x = 0; x <= W; x += 8) {
      var y = arcY(x);
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(51, 65, 85, 0.55)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    var elapsed = (now - t0) / 1000;
    dots.forEach(function (d) {
      var age = d.spawnAt ? (now - d.spawnAt) / 380 : 1;
      var spawnScale = d.spawnAt ? Math.min(1, easeOutBack(Math.min(1, age))) : 1;
      var pulse = reduceMotion ? 0 : Math.sin(elapsed * 0.9 + d.phase) * 0.06;
      var r = Math.max(0.1, d.radius * spawnScale * (1 + pulse));
      var isHatched = d.idea.status === 'hatched';

      if (isHatched) {
        drawBurst(d.x, d.y, r + 3, d.opacity * spawnScale);
      } else {
        var rgb = d.rgb || [129, 140, 248];
        var rgbStr = rgb[0] + ', ' + rgb[1] + ', ' + rgb[2];
        ctx.beginPath();
        var grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, r * 2.4);
        grad.addColorStop(0, 'rgba(' + rgbStr + ', ' + (0.35 * d.opacity * spawnScale) + ')');
        grad.addColorStop(1, 'rgba(' + rgbStr + ', 0)');
        ctx.fillStyle = grad;
        ctx.arc(d.x, d.y, r * 2.4, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.fillStyle = 'rgba(' + rgbStr + ', ' + d.opacity * spawnScale + ')';
        ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    if (!reduceMotion) requestAnimationFrame(draw);
  }

  function easeOutBack(x) {
    var c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
  }

  function drawBurst(cx, cy, r, opacity) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = 'rgba(245, 158, 11, ' + opacity + ')';
    var spikes = 6;
    ctx.beginPath();
    for (var i = 0; i < spikes * 2; i++) {
      var rad = i % 2 === 0 ? r : r * 0.45;
      var ang = (Math.PI / spikes) * i - Math.PI / 2;
      var px = Math.cos(ang) * rad, py = Math.sin(ang) * rad;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
  if (reduceMotion) draw(performance.now()); // one static frame

  // Tap-to-view: nearest dot within threshold
  canvas.addEventListener('click', function (e) {
    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left, my = e.clientY - rect.top;
    var best = null, bestDist = 26; // px hit-radius
    dots.forEach(function (d) {
      var dist = Math.hypot(d.x - mx, d.y - my);
      if (dist < bestDist) { bestDist = dist; best = d; }
    });
    if (best) openView(best.idea);
  });

  // ---------------------------------------------------------------------
  // Capture
  // ---------------------------------------------------------------------
  var fabBtn = document.getElementById('fabBtn');
  var capturePanel = document.getElementById('capturePanel');
  var captureInput = document.getElementById('captureInput');
  var submitCapture = document.getElementById('submitCapture');
  var cancelCapture = document.getElementById('cancelCapture');
  var confirmFlash = document.getElementById('confirmFlash');
  var categoryChips = document.getElementById('categoryChips');

  // Last-used category is the default every time capture opens -- picking
  // a category is optional friction, not a required step, so a rapid dump
  // of several things in the same category (the normal case) never needs
  // to touch this row after the first pick.
  var selectedCategory = (function () {
    try { return localStorage.getItem(LAST_CATEGORY_KEY) || categories[0]; } catch (e) { return categories[0]; }
  })();
  var addingCategory = false;

  function selectCategory(name) {
    selectedCategory = name;
    try { localStorage.setItem(LAST_CATEGORY_KEY, name); } catch (e) { /* best effort */ }
    renderCategoryChips();
  }

  function renderCategoryChips() {
    categoryChips.innerHTML = '';

    if (addingCategory) {
      var wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;gap:6px;width:100%;align-items:center;';
      var input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'New category name';
      input.maxLength = 24;
      input.style.cssText = 'flex:1;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:999px;padding:6px 12px;color:var(--text);font-size:12px;font-family:var(--font-body);outline:none;min-width:0;';
      var confirmBtn = document.createElement('button');
      confirmBtn.textContent = '✓';
      confirmBtn.className = 'cat-chip';
      confirmBtn.style.cssText = 'color:var(--good);border-color:var(--good);flex:0 0 auto;';
      var cancelBtn = document.createElement('button');
      cancelBtn.textContent = '✕';
      cancelBtn.className = 'cat-chip';
      cancelBtn.style.cssText = 'flex:0 0 auto;';

      function confirmAdd() {
        var name = input.value.trim().slice(0, 24);
        if (name && categories.indexOf(name) === -1) {
          categories.push(name);
          saveCategories(categories);
        }
        addingCategory = false;
        if (name) selectCategory(name); else renderCategoryChips();
      }
      confirmBtn.addEventListener('click', confirmAdd);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') confirmAdd();
        if (e.key === 'Escape') { addingCategory = false; renderCategoryChips(); }
      });
      cancelBtn.addEventListener('click', function () { addingCategory = false; renderCategoryChips(); });

      wrap.appendChild(input);
      wrap.appendChild(confirmBtn);
      wrap.appendChild(cancelBtn);
      categoryChips.appendChild(wrap);
      input.focus();
      return;
    }

    categories.forEach(function (name) {
      var chip = document.createElement('button');
      chip.className = 'cat-chip';
      chip.textContent = name;
      var selected = name === selectedCategory;
      var color = categoryColor(name);
      chip.style.borderColor = selected ? color : '';
      chip.style.color = selected ? color : '';
      chip.style.background = selected ? 'rgba(' + hexToRgb(color).join(',') + ',0.12)' : '';
      chip.addEventListener('click', function () { selectCategory(name); });
      categoryChips.appendChild(chip);
    });

    var addChip = document.createElement('button');
    addChip.className = 'cat-chip add';
    addChip.textContent = '+ New';
    addChip.addEventListener('click', function () { addingCategory = true; renderCategoryChips(); });
    categoryChips.appendChild(addChip);
  }

  var suggestionsEl = document.getElementById('suggestions');
  // "First word" threshold -- roughly 3 characters, not the very first
  // keystroke. Triggering at 1 character would surface near-random noise
  // (almost everything contains one letter); this waits for enough of a
  // real word to make a match mean something.
  var SUGGEST_MIN_CHARS = 3;
  var MAX_SUGGESTIONS = 4;

  function openCapture() {
    fabBtn.style.display = 'none';
    capturePanel.classList.add('open');
    captureInput.value = '';
    submitCapture.disabled = true;
    addingCategory = false;
    renderCategoryChips();
    renderSuggestions('');
    captureInput.focus();
  }
  function closeCapture() {
    capturePanel.classList.remove('open');
    fabBtn.style.display = 'flex';
    renderSuggestions('');
    if (listening && recognition) recognition.stop();
  }
  fabBtn.addEventListener('click', openCapture);
  cancelCapture.addEventListener('click', closeCapture);
  captureInput.addEventListener('input', function () {
    submitCapture.disabled = !captureInput.value.trim();
    renderSuggestions(captureInput.value);
  });
  captureInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') doCapture();
    if (e.key === 'Escape') closeCapture();
  });
  submitCapture.addEventListener('click', doCapture);

  // Lowercase, collapsed whitespace, trailing punctuation stripped --
  // catches "Call the bank." vs "call the bank" as the same repeat
  // without needing anything fuzzier. Rephrased repeats ("worried about
  // rent" vs "rent is stressing me out") won't match here -- that needs
  // real semantic comparison, which means an LLM call, which means idea
  // text leaving the device. That's a real conflict with this tool's
  // local-only privacy requirement, so it's deliberately NOT wired in --
  // if it's ever added, it has to be an explicit opt-in the user turns on
  // knowing captures would then go over the network, never silent-by-default.
  function normalizeText(text) {
    return text.trim().toLowerCase().replace(/\s+/g, ' ').replace(/[.!?,;:]+$/, '');
  }

  // Repeats only ever bump an already-INCUBATING idea -- one that was
  // deliberately let rest stays resting even if the same thought recurs;
  // silently reviving it would undercut "let it rest" actually meaning
  // something. A fresh recurrence of a rested thought just becomes its
  // own new incubating entry, which correctly reflects "this came up again."
  function findRepeat(text) {
    var norm = normalizeText(text);
    if (!norm) return null;
    return incubating().find(function (i) { return normalizeText(i.text) === norm; }) || null;
  }

  // Same "bump, don't duplicate" behavior whether the repeat was detected
  // by an exact match on submit (doCapture) or picked from the live
  // suggestion list below -- one path, so the two can't drift apart.
  function bumpRepeat(idea) {
    idea.count = (idea.count || 1) + 1;
    idea.timestamp = Date.now();
    idea._spawnAt = performance.now();
    saveIdeas(stripTransient(ideas));
    layout();
    if (reduceMotion) draw(performance.now());
    closeCapture();
    flashConfirm("You've had this thought before ✓");
    renderFooterLinks();
  }

  // Live typeahead -- substring match (not just prefix) against
  // incubating ideas, so "sushi" surfaces "order sushi for dinner"
  // regardless of where in the thought it appears. Purely a shortcut:
  // ignoring every suggestion and just hitting submit behaves identically
  // (doCapture's own exact-match check runs either way).
  function renderSuggestions(query) {
    var norm = normalizeText(query);
    if (norm.length < SUGGEST_MIN_CHARS) {
      suggestionsEl.classList.remove('open');
      suggestionsEl.innerHTML = '';
      return;
    }
    var matches = incubating()
      .filter(function (i) { return normalizeText(i.text).indexOf(norm) !== -1; })
      .sort(function (a, b) { return (b.count || 1) - (a.count || 1) || b.timestamp - a.timestamp; })
      .slice(0, MAX_SUGGESTIONS);

    suggestionsEl.innerHTML = '';
    if (!matches.length) { suggestionsEl.classList.remove('open'); return; }

    matches.forEach(function (idea) {
      var row = document.createElement('button');
      row.className = 'suggestion-row';
      var dot = document.createElement('span');
      dot.className = 'suggestion-dot';
      dot.style.background = categoryColor(catName(idea));
      var text = document.createElement('span');
      text.className = 'suggestion-text';
      text.textContent = idea.text;
      row.appendChild(dot);
      row.appendChild(text);
      if ((idea.count || 1) > 1) {
        var count = document.createElement('span');
        count.className = 'suggestion-count';
        count.textContent = (idea.count || 1) + 'x';
        row.appendChild(count);
      }
      row.addEventListener('click', function () { bumpRepeat(idea); });
      suggestionsEl.appendChild(row);
    });
    suggestionsEl.classList.add('open');
  }

  function doCapture() {
    var text = captureInput.value.trim();
    if (!text) return;

    var repeat = findRepeat(text);
    if (repeat) { bumpRepeat(repeat); return; }

    var idea = { id: uid(), text: text, timestamp: Date.now(), status: 'incubating', category: selectedCategory, count: 1 };
    idea._spawnAt = performance.now();
    ideas.push(idea);
    saveIdeas(stripTransient(ideas));
    // usage-event hook: capture used (count only) -- not implemented, see header note
    layout();
    if (reduceMotion) draw(performance.now());
    closeCapture();
    flashConfirm();
    renderFooterLinks();
  }

  function stripTransient(list) {
    return list.map(function (i) {
      var copy = {}; for (var k in i) if (k !== '_spawnAt') copy[k] = i[k];
      return copy;
    });
  }

  // ---------------------------------------------------------------------
  // Voice capture -- the browser's own SpeechRecognition, not a server
  // call of ours (no new backend, no new key to manage; the recognition
  // itself is handled by the browser/OS, same as it is for any other page
  // using this standard Web API). The mic button only ever appears if the
  // browser actually supports it -- feature-detected once at load, never
  // shown as a button that would just fail on tap. One utterance per tap
  // (continuous=false): a single held-down thought, not an open mic left
  // running, matching this tool's own "one thing captured at a time" spirit.
  // ---------------------------------------------------------------------
  var micBtn = document.getElementById('micBtn');
  var micStatus = document.getElementById('micStatus');
  var SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
  var recognition = null;
  var listening = false;
  var micBaseText = '';

  if (SpeechRecognitionCtor) {
    micBtn.style.display = 'flex';
    recognition = new SpeechRecognitionCtor();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = navigator.language || 'en-US';

    recognition.onresult = function (e) {
      var transcript = '';
      for (var i = 0; i < e.results.length; i++) transcript += e.results[i][0].transcript;
      captureInput.value = (micBaseText ? micBaseText + ' ' : '') + transcript;
      submitCapture.disabled = !captureInput.value.trim();
      renderSuggestions(captureInput.value);
    };
    recognition.onerror = function (e) {
      stopListening();
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        flashConfirm("Mic access blocked -- check your browser's site permissions.");
      } else if (e.error !== 'no-speech' && e.error !== 'aborted') {
        flashConfirm("Didn't catch that -- try again.");
      }
    };
    recognition.onend = function () { stopListening(); };

    micBtn.addEventListener('click', function () {
      if (listening) { recognition.stop(); return; }
      micBaseText = captureInput.value.trim();
      listening = true;
      micBtn.classList.add('listening');
      micStatus.style.display = 'block';
      try { recognition.start(); } catch (e) { stopListening(); }
    });
  }

  function stopListening() {
    listening = false;
    micBtn.classList.remove('listening');
    micStatus.style.display = 'none';
  }

  function flashConfirm(message) {
    confirmFlash.textContent = message || 'Safe. ✓';
    confirmFlash.classList.add('show');
    setTimeout(function () {
      confirmFlash.classList.remove('show');
      confirmFlash.textContent = 'Safe. ✓';
    }, 1400);
  }

  // ---------------------------------------------------------------------
  // View-one-idea popover
  // ---------------------------------------------------------------------
  var viewBackdrop = document.getElementById('viewBackdrop');
  var viewText = document.getElementById('viewText');
  var viewMeta = document.getElementById('viewMeta');
  var viewBadge = document.getElementById('viewBadge');
  var viewCatBadge = document.getElementById('viewCatBadge');
  var viewClose = document.getElementById('viewClose');

  function relTime(ts) {
    var mins = Math.round((Date.now() - ts) / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.round(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.round(hrs / 24);
    return days + 'd ago';
  }

  function setCatBadge(el, idea) {
    var name = catName(idea);
    var color = categoryColor(name);
    el.textContent = name;
    el.style.color = color;
    el.style.background = 'rgba(' + hexToRgb(color).join(',') + ',0.14)';
  }

  function openView(idea) {
    viewText.textContent = idea.text;
    var count = idea.count || 1;
    viewMeta.textContent = (count > 1 ? 'Thought ' + count + ' times · last ' : 'Captured ') + relTime(idea.timestamp);
    viewBadge.style.display = idea.status === 'hatched' ? 'inline-block' : 'none';
    setCatBadge(viewCatBadge, idea);
    viewBackdrop.classList.add('open');
  }
  function closeView() { viewBackdrop.classList.remove('open'); }
  viewClose.addEventListener('click', closeView);
  viewBackdrop.addEventListener('click', function (e) { if (e.target === viewBackdrop) closeView(); });

  // ---------------------------------------------------------------------
  // Weekly check-in -- one idea at a time, three actions, auto-advance.
  // ---------------------------------------------------------------------
  var checkinBtn = document.getElementById('checkinBtn');
  var checkin = document.getElementById('checkin');
  var checkinProgress = document.getElementById('checkinProgress');
  var checkinBody = document.getElementById('checkinBody');
  var checkinActions = document.getElementById('checkinActions');

  var queue = [];
  var qIndex = 0;

  checkinBtn.addEventListener('click', function () {
    queue = incubating().slice().sort(function (a, b) { return a.timestamp - b.timestamp; });
    qIndex = 0;
    // usage-event hook: checkin opened (count only) -- not implemented, see header note
    if (!queue.length) {
      showEmptyCheckinToast();
      return;
    }
    checkin.classList.add('open');
    renderCheckinStep();
  });

  function showEmptyCheckinToast() {
    flashConfirm('Nothing to check on right now.');
  }

  function ageDays(ts, count) {
    var d = Math.floor((Date.now() - ts) / 86400000);
    var base = d <= 0 ? 'today' : d === 1 ? '1 day incubating' : d + ' days incubating';
    return count > 1 ? 'Thought about ' + count + ' times · ' + base : base;
  }

  function renderCheckinStep() {
    checkinProgress.innerHTML = '';
    queue.forEach(function (_, i) {
      var dot = document.createElement('div');
      dot.className = 'checkin-dot' + (i < qIndex ? ' done' : '');
      checkinProgress.appendChild(dot);
    });

    if (qIndex >= queue.length) {
      checkinBody.innerHTML =
        '<div class="checkin-card checkin-done">' +
        '<div class="glyph">🌿</div>' +
        '<h2>You\'re all caught up</h2>' +
        '<p>Everything incubating has been checked on. The rest can keep resting until next time.</p>' +
        '</div>';
      checkinActions.innerHTML = '';
      var closeBtn = document.createElement('button');
      closeBtn.className = 'action-btn close-checkin';
      closeBtn.textContent = 'Back to incubator';
      closeBtn.addEventListener('click', closeCheckin);
      checkinActions.appendChild(closeBtn);
      return;
    }

    var idea = queue[qIndex];
    checkinBody.innerHTML =
      '<div class="checkin-card">' +
      '<div class="checkin-eyebrow">Idea ' + (qIndex + 1) + ' of ' + queue.length + '</div>' +
      '<div class="checkin-badges"><span class="cat-badge" id="checkinCatBadge"></span></div>' +
      '<p class="checkin-idea"></p>' +
      '<div class="checkin-age"></div>' +
      '</div>';
    checkinBody.querySelector('.checkin-idea').textContent = idea.text;
    checkinBody.querySelector('.checkin-age').textContent = ageDays(idea.timestamp, idea.count || 1);
    setCatBadge(checkinBody.querySelector('#checkinCatBadge'), idea);

    checkinActions.innerHTML = '';
    checkinActions.appendChild(makeActionBtn('keep', 'Keep incubating', function () { advance(null); }));
    checkinActions.appendChild(makeActionBtn('hatch', '🐣 Hatch it', function () { advance('hatched'); }));
    checkinActions.appendChild(makeActionBtn('rest', 'Let it rest', function () { advance('resting'); }));
  }

  function makeActionBtn(cls, label, handler) {
    var b = document.createElement('button');
    b.className = 'action-btn ' + cls;
    b.textContent = label;
    b.addEventListener('click', handler);
    return b;
  }

  function advance(newStatus) {
    var idea = queue[qIndex];
    if (newStatus) {
      var real = ideas.find(function (i) { return i.id === idea.id; });
      if (real) real.status = newStatus;
      saveIdeas(stripTransient(ideas));
      // usage-event hook: idea hatched / let rest (count only) -- see header note
    }
    qIndex += 1;
    layout();
    renderCheckinStep();
    renderFooterLinks();
  }

  function closeCheckin() {
    checkin.classList.remove('open');
    if (reduceMotion) draw(performance.now());
  }

  // ---------------------------------------------------------------------
  // Resting overlay -- recoverable, never framed as loss.
  // ---------------------------------------------------------------------
  var restingBtn = document.getElementById('restingBtn');
  var restingOverlay = document.getElementById('restingOverlay');
  var restingClose = document.getElementById('restingClose');
  var restingListEl = document.getElementById('restingList');

  function renderFooterLinks() {
    var n = restingList().length;
    restingBtn.style.display = n ? 'inline-flex' : 'none';
    restingBtn.textContent = 'Resting (' + n + ')';
  }

  restingBtn.addEventListener('click', function () {
    renderRestingList();
    restingOverlay.classList.add('open');
  });
  restingClose.addEventListener('click', function () { restingOverlay.classList.remove('open'); });
  restingOverlay.addEventListener('click', function (e) { if (e.target === restingOverlay) restingOverlay.classList.remove('open'); });

  function renderRestingList() {
    var list = restingList().slice().sort(function (a, b) { return b.timestamp - a.timestamp; });
    restingListEl.innerHTML = '';
    if (!list.length) {
      restingListEl.innerHTML = '<div class="resting-empty">Nothing resting right now.</div>';
      return;
    }
    list.forEach(function (idea) {
      var row = document.createElement('div');
      row.className = 'resting-row';
      var textEl = document.createElement('div');
      textEl.className = 'resting-row-text';
      textEl.textContent = idea.text;
      var btn = document.createElement('button');
      btn.textContent = 'Bring back';
      btn.addEventListener('click', function () {
        idea.status = 'incubating';
        saveIdeas(stripTransient(ideas));
        layout();
        if (reduceMotion) draw(performance.now());
        renderRestingList();
        renderFooterLinks();
      });
      row.appendChild(textEl);
      row.appendChild(btn);
      restingListEl.appendChild(row);
    });
  }

  // ---------------------------------------------------------------------
  // Export -- the safety valve for local-only storage.
  // ---------------------------------------------------------------------
  document.getElementById('exportBtn').addEventListener('click', function () {
    var blob = new Blob([JSON.stringify(stripTransient(ideas), null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var d = new Date();
    var stamp = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    a.href = url;
    a.download = 'hatchem-ideas-' + stamp + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  });

  // ---------------------------------------------------------------------
  // AI Analyze -- opt-in only. This is the ONE place captured text leaves
  // the device at all, and only because the user explicitly turned it on;
  // everything else about this tool stays local-only (see the storage
  // header comment above). Proxies through DESIRED's existing engine
  // (reuses its already-configured GROQ_API_KEY server-side -- this static
  // page has no secret of its own to hold) via an unauthenticated route
  // scoped narrowly to exactly this (engine/src/routes/public.js).
  //
  // Purely descriptive: clusters and possible duplicates, never a verdict
  // on what to hatch or let rest -- that stays a human-only three-button
  // decision in the weekly check-in, same as before this existed.
  // ---------------------------------------------------------------------
  var ENGINE_URL = 'https://engine-api-321521216754.asia-southeast1.run.app';
  var AI_OPTIN_KEY = 'hatchem_ai_optin_v1';
  var aiOverlay = document.getElementById('aiOverlay');
  var aiBody = document.getElementById('aiBody');
  var aiClose = document.getElementById('aiClose');
  var analyzeBtn = document.getElementById('analyzeBtn');
  var aiSnapshot = []; // {id, text, category} for the incubating set sent in the last request -- lets merge map response indexes back to real ideas without ever sending ids over the wire.

  function aiOptedIn() {
    try { return localStorage.getItem(AI_OPTIN_KEY) === 'true'; } catch (e) { return false; }
  }
  function setAiOptIn(val) {
    try { localStorage.setItem(AI_OPTIN_KEY, val ? 'true' : 'false'); } catch (e) { /* best effort */ }
  }

  function openAiOverlay() {
    aiOverlay.classList.add('open');
    if (aiOptedIn()) runAnalysis(); else renderAiConsent();
  }
  function closeAiOverlay() { aiOverlay.classList.remove('open'); }
  analyzeBtn.addEventListener('click', openAiOverlay);
  aiClose.addEventListener('click', closeAiOverlay);
  aiOverlay.addEventListener('click', function (e) { if (e.target === aiOverlay) closeAiOverlay(); });

  function renderAiConsent() {
    aiBody.innerHTML = '';
    var p = document.createElement('p');
    p.className = 'ai-consent-text';
    p.textContent = "HatchEm normally never sends anything off this device. Turning this on sends your currently-incubating thoughts' text to Groq (an AI provider) for analysis -- looking for common themes and possible duplicates worded differently. Nothing is stored server-side, and you can turn this back off anytime.";
    aiBody.appendChild(p);

    var actions = document.createElement('div');
    actions.className = 'ai-actions';
    var cancelBtn = document.createElement('button');
    cancelBtn.className = 'ai-btn';
    cancelBtn.textContent = 'Not now';
    cancelBtn.addEventListener('click', closeAiOverlay);
    var enableBtn = document.createElement('button');
    enableBtn.className = 'ai-btn primary';
    enableBtn.textContent = 'Enable & Analyze';
    enableBtn.addEventListener('click', function () { setAiOptIn(true); runAnalysis(); });
    actions.appendChild(cancelBtn);
    actions.appendChild(enableBtn);
    aiBody.appendChild(actions);
  }

  function renderAiDisableRow() {
    var row = document.createElement('div');
    row.className = 'ai-disable-row';
    var btn = document.createElement('button');
    btn.textContent = 'Turn off AI analysis';
    btn.addEventListener('click', function () { setAiOptIn(false); closeAiOverlay(); });
    row.appendChild(btn);
    return row;
  }

  async function runAnalysis() {
    var pool = incubating();
    aiSnapshot = pool.map(function (i) { return { id: i.id, text: i.text, category: catName(i) }; });

    aiBody.innerHTML = '<div class="ai-loading">Looking for patterns…</div>';

    if (!aiSnapshot.length) {
      aiBody.innerHTML = '<div class="ai-empty">Nothing incubating to analyze yet.</div>';
      aiBody.appendChild(renderAiDisableRow());
      return;
    }

    try {
      var resp = await fetch(ENGINE_URL + '/public/hatchem/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: aiSnapshot.map(function (i) { return { text: i.text, category: i.category }; }) }),
      });
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.error || ('Request failed: ' + resp.status));
      renderAiResults(data);
    } catch (e) {
      aiBody.innerHTML = '';
      var err = document.createElement('div');
      err.className = 'ai-error';
      err.textContent = "Couldn't reach the analyzer -- try again in a moment.";
      aiBody.appendChild(err);
      aiBody.appendChild(renderAiDisableRow());
    }
  }

  function aiItemRow(idx) {
    var item = aiSnapshot[idx];
    var row = document.createElement('div');
    row.className = 'ai-group-item';
    var dot = document.createElement('span');
    dot.className = 'ai-group-dot';
    dot.style.background = categoryColor(item ? item.category : categories[0]);
    var text = document.createElement('span');
    text.textContent = item ? item.text : '(removed)';
    row.appendChild(dot);
    row.appendChild(text);
    return row;
  }

  function renderAiResults(data) {
    aiBody.innerHTML = '';

    if (data.note) {
      var note = document.createElement('div');
      note.className = 'ai-note';
      note.textContent = data.note;
      aiBody.appendChild(note);
    }

    if (data.clusters && data.clusters.length) {
      var clusterLabel = document.createElement('div');
      clusterLabel.className = 'ai-section-label';
      clusterLabel.textContent = 'THEMES';
      aiBody.appendChild(clusterLabel);
      data.clusters.forEach(function (c) {
        var group = document.createElement('div');
        group.className = 'ai-group';
        var theme = document.createElement('div');
        theme.className = 'ai-group-theme';
        theme.textContent = c.theme;
        group.appendChild(theme);
        c.idea_indexes.forEach(function (idx) { group.appendChild(aiItemRow(idx)); });
        aiBody.appendChild(group);
      });
    }

    if (data.duplicates && data.duplicates.length) {
      var dupLabel = document.createElement('div');
      dupLabel.className = 'ai-section-label';
      dupLabel.textContent = 'POSSIBLE DUPLICATES';
      aiBody.appendChild(dupLabel);
      data.duplicates.forEach(function (d) {
        var group = document.createElement('div');
        group.className = 'ai-group';
        var reason = document.createElement('div');
        reason.className = 'ai-group-reason';
        reason.textContent = d.reason;
        group.appendChild(reason);
        d.idea_indexes.forEach(function (idx) { group.appendChild(aiItemRow(idx)); });
        var mergeBtn = document.createElement('button');
        mergeBtn.className = 'ai-merge-btn';
        mergeBtn.textContent = 'Merge these';
        mergeBtn.addEventListener('click', function () { mergeSuggested(d.idea_indexes); });
        group.appendChild(mergeBtn);
        aiBody.appendChild(group);
      });
    }

    if ((!data.clusters || !data.clusters.length) && (!data.duplicates || !data.duplicates.length) && !data.note) {
      var empty = document.createElement('div');
      empty.className = 'ai-empty';
      empty.textContent = "Nothing stood out this time -- no repeated themes or duplicates found.";
      aiBody.appendChild(empty);
    }

    aiBody.appendChild(renderAiDisableRow());
  }

  // Keeps whichever idea in the group already has the highest count (the
  // most-established one), sums the rest into it, and drops the others --
  // same "bump, don't duplicate" spirit as findRepeat's exact-match merge,
  // just triggered by the AI's fuzzier read instead of an exact string match.
  function mergeSuggested(indexList) {
    var targets = indexList.map(function (i) { return aiSnapshot[i]; }).filter(Boolean)
      .map(function (snap) { return ideas.find(function (i) { return i.id === snap.id; }); })
      .filter(Boolean);
    if (targets.length < 2) return;

    var keep = targets.reduce(function (a, b) { return (a.count || 1) >= (b.count || 1) ? a : b; });
    var totalCount = targets.reduce(function (sum, i) { return sum + (i.count || 1); }, 0);
    keep.count = totalCount;
    keep.timestamp = Date.now();
    keep._spawnAt = performance.now();

    var dropIds = targets.filter(function (i) { return i !== keep; }).map(function (i) { return i.id; });
    ideas = ideas.filter(function (i) { return dropIds.indexOf(i.id) === -1; });
    saveIdeas(stripTransient(ideas));
    layout();
    if (reduceMotion) draw(performance.now());
    closeAiOverlay();
    flashConfirm('Merged ✓');
  }

  renderFooterLinks();
})();
</script>
</body>
</html>
